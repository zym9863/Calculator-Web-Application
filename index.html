<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>现代计算器</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="一个具有现代设计的网页计算器">
</head>
<body>
    <main class="calculator-container">
        <h1 class="sr-only">网页计算器</h1>
        <div class="calculator">
            <div class="display" role="region" aria-live="polite">
                <input type="text" id="result" readonly aria-label="计算结果">
            </div>
            <div class="buttons">
                <button class="clear" aria-label="清除">C</button>
                <button class="operator" aria-label="除">/</button>
                <button class="operator" aria-label="乘">*</button>
                <button class="operator" aria-label="减">-</button>
                <button class="number" aria-label="7">7</button>
                <button class="number" aria-label="8">8</button>
                <button class="number" aria-label="9">9</button>
                <button class="operator" aria-label="加">+</button>
                <button class="number" aria-label="4">4</button>
                <button class="number" aria-label="5">5</button>
                <button class="number" aria-label="6">6</button>
                <button class="equals" aria-label="等于">=</button>
                <button class="number" aria-label="1">1</button>
                <button class="number" aria-label="2">2</button>
                <button class="number" aria-label="3">3</button>
                <button class="number" aria-label="0">0</button>
                <button class="decimal" aria-label="小数点">.</button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
